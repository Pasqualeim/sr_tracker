name: Build & Upload EXE (Windows)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-upload:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --icon app_icon.ico --add-data "app_icon.ico;." sr_tracker.py --name "SAP-SR-Tracker"

      - name: Upload EXE to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "dist/SAP-SR-Tracker.exe" --clobber
